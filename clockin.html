<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calamari Clock-In</title>
<style>
body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; gap: 12px; }
a { display: block; width: 280px; padding: 14px; text-align: center; text-decoration: none; color: white; border-radius: 12px; font-size: 16px; font-weight: bold; }
h2 { color: #666; font-size: 12px; margin: 6px 0 2px 0; font-weight: normal; }
</style>
</head>
<body>
<h1>Arbeit starten</h1>

<!-- V1: JavaScript redirect mit intent:// (Variante A hatte die App geoeffnet) -->
<h2>V1: JS redirect intent:// mit path /</h2>
<a style="background:#27a082" href="#" onclick="window.location='intent://dashboardFragment/?dashboardScreenType=CLOCK_IN#Intent;scheme=calamari;package=com.chrobrus.calamari.mobile.employee;action=android.intent.action.VIEW;category=android.intent.category.BROWSABLE;category=android.intent.category.DEFAULT;end';return false;">
  V1: Clock-In
</a>

<!-- V2: iframe trick mit calamari:// -->
<h2>V2: iframe mit calamari://</h2>
<a style="background:#1a7a5f" href="#" onclick="var i=document.createElement('iframe');i.style.display='none';i.src='calamari://dashboardFragment?dashboardScreenType=CLOCK_IN';document.body.appendChild(i);return false;">
  V2: Clock-In
</a>

<!-- V3: window.location calamari:// direkt -->
<h2>V3: JS window.location calamari://</h2>
<a style="background:#0d5a42" href="#" onclick="window.location='calamari://dashboardFragment?dashboardScreenType=CLOCK_IN';return false;">
  V3: Clock-In
</a>

<!-- V4: anchor tag mit calamari:// (user-initiated click) -->
<h2>V4: direkter link calamari://</h2>
<a style="background:#8b4513" href="calamari://dashboardFragment?dashboardScreenType=CLOCK_IN">
  V4: Clock-In
</a>

<!-- V5: intent:// ohne path, query als S. extra -->
<h2>V5: intent:// ohne path + S.dashboardScreenType</h2>
<a style="background:#555" href="intent://dashboardFragment#Intent;scheme=calamari;package=com.chrobrus.calamari.mobile.employee;action=android.intent.action.VIEW;category=android.intent.category.BROWSABLE;category=android.intent.category.DEFAULT;S.dashboardScreenType=CLOCK_IN;end">
  V5: Clock-In
</a>

</body>
</html>
