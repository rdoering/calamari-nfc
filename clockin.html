<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calamari Clock-In</title>
<style>
body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; gap: 12px; }
a { display: block; width: 280px; padding: 14px; text-align: center; text-decoration: none; color: white; border-radius: 12px; font-size: 16px; font-weight: bold; }
h2 { color: #666; font-size: 12px; margin: 6px 0 2px 0; font-weight: normal; }
</style>
</head>
<body>
<h1>Arbeit starten</h1>

<!-- V1: data= Parameter mit vollstaendiger URL-encoded calamari:// URI -->
<h2>V1: intent:// mit data= (vollstaendige URI encoded)</h2>
<a style="background:#27a082" href="intent:#Intent;action=android.intent.action.VIEW;category=android.intent.category.BROWSABLE;category=android.intent.category.DEFAULT;package=com.chrobrus.calamari.mobile.employee;data=calamari%3A%2F%2FdashboardFragment%3FdashboardScreenType%3DCLOCK_IN;end">
  V1: Clock-In
</a>

<!-- V2: launchFlags + data= -->
<h2>V2: intent:// mit data= + launchFlags</h2>
<a style="background:#1a7a5f" href="intent:#Intent;action=android.intent.action.VIEW;category=android.intent.category.BROWSABLE;category=android.intent.category.DEFAULT;package=com.chrobrus.calamari.mobile.employee;launchFlags=0x10000000;data=calamari%3A%2F%2FdashboardFragment%3FdashboardScreenType%3DCLOCK_IN;end">
  V2: Clock-In
</a>

<!-- V3: data= mit component -->
<h2>V3: intent:// mit data= + component</h2>
<a style="background:#0d5a42" href="intent:#Intent;action=android.intent.action.VIEW;category=android.intent.category.BROWSABLE;category=android.intent.category.DEFAULT;component=com.chrobrus.calamari.mobile.employee/io.calamari.mobile.android.features.main.MainActivity;data=calamari%3A%2F%2FdashboardFragment%3FdashboardScreenType%3DCLOCK_IN;end">
  V3: Clock-In
</a>

</body>
</html>
