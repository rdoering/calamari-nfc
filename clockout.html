<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calamari Clock-Out</title>
<script>
window.location = "calamari://dashboardFragment?dashboardScreenType=CLOCK_OUT";
setTimeout(function() {
  document.getElementById("msg").style.display = "block";
}, 2000);
</script>
<style>
body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
#msg { display: none; text-align: center; color: #333; }
a { display: block; margin-top: 16px; padding: 16px 32px; background: #e05555; color: white; text-decoration: none; border-radius: 12px; font-size: 18px; font-weight: bold; }
</style>
</head>
<body>
<div id="msg">
  <p>Falls die App nicht automatisch geoeffnet wurde:</p>
  <a href="calamari://dashboardFragment?dashboardScreenType=CLOCK_OUT">Arbeit beenden</a>
</div>
</body>
</html>
